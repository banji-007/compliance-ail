apiVersion: v1
kind: Service
metadata:
  name: {{ include "ail-gateway.fullname" . }}-dashboard
  labels:
    {{- include "ail-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  selector:
    {{- include "ail-gateway.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 3001
      targetPort: http
      protocol: TCP
