{{/*
ServiceAccount — Blocker 1 Fix (K8s PSAT Attestation).

All AIL workload pods (agent, control-plane, dashboard) run under this SA.
The SPIRE server's k8s_psat NodeAttestor validates incoming attestation
requests against:
  - The pod's projected service account token (automountServiceAccountToken: true)
  - The SA name/namespace allowlist in values.yaml → spire.spire-server.nodeAttestor

This replaces the Docker Compose join_token bootstrap entirely.
No docker.sock mount, no token-generator init container, no race condition.
SPIRE issues SVIDs to pods that present a valid PSAT — zero manual wiring.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ail-gateway.serviceAccountName" . }}
  labels:
    {{- include "ail-gateway.labels" . | nindent 4 }}
# automountServiceAccountToken must be true for SPIRE PSAT attestation.
# The projected token is the credential SPIRE validates against the K8s
# TokenReview API to issue SVIDs.
automountServiceAccountToken: true
