{{/*
Kubernetes Secret — replaces .env file from Docker Compose.
Holds: OpenAI API key + ImmuDB credentials.

For production, do not set values here. Use one of:
  - External Secrets Operator (ESO) pointing to Vault / AWS Secrets Manager
  - helm install --set secrets.openaiApiKey=$(cat /run/secrets/openai-key)
  - Sealed Secrets (Bitnami) for GitOps workflows
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ail-gateway.fullname" . }}-secrets
  labels:
    {{- include "ail-gateway.labels" . | nindent 4 }}
type: Opaque
data:
  openai-api-key: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  immudb-user: {{ .Values.secrets.immudb.user | b64enc | quote }}
  immudb-password: {{ .Values.secrets.immudb.password | b64enc | quote }}
