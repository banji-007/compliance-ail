services:
  ail-control-plane:
    build:
      context: ./control_plane
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=sqlite:////data/control_plane.db
      # ImmuDB REST (used for scan in /audit; scan needs no SDK).
      - IMMUDB_URL=http://immudb:8080
      - IMMUDB_USER=${IMMUDB_USER}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD}
      # Verifier service — /audit calls this for per-entry proof verification.
      - VERIFIER_URL=http://verifier:8003
      # API key for mutating control-plane endpoints (PUT/POST /tenants).
      # Must be set in .env — absent key disables auth with a 503 response.
      - CONTROL_PLANE_API_KEY=${CONTROL_PLANE_API_KEY}
    volumes:
      # policy/ mounted at runtime — changes on tenant config updates.
      - ./policy:/policy:ro
      - control-plane-data:/data
    working_dir: /app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:1.14.1
    ports:
      - "8181:8181"
    environment:
      - AIL_TENANT_ID=${AIL_TENANT_ID:-tenant_default}
    command:
      - "run"
      - "--server"
      - "--config-file=/config/opa-config.yaml"
      - "--log-format=text"
      - "--log-level=info"
      - "--addr=0.0.0.0:8181"
    volumes:
      - ./opa-config.yaml:/config/opa-config.yaml:ro
    depends_on:
      ail-control-plane:
        condition: service_healthy
    # OPA loads policy via bundle API — no local files to eval against.
    # Health check verifies the binary is alive; bundle load status is
    # visible in OPA logs and Prometheus metrics.
    healthcheck:
      test: ["CMD", "/opa", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  immudb:
    image: codenotary/immudb:1.9.5
    ports:
      - "3322:3322"
      # Port 8080 (REST API) intentionally not exposed to host — internal Docker
      # network only. Access via service name 'immudb' from other containers.
    environment:
      - IMMUDB_USER=${IMMUDB_USER}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD}
    volumes:
      # Signing key enables cryptographic state signing. Generate once with
      # "make keygen" before starting. Without this file, ImmuDB starts without
      # signing; the verifier will log a warning but still run.
      - ./keys:/keys:ro
    command:
      - "--signingKey=/keys/signing.key"
    healthcheck:
      test: ["CMD", "immuadmin", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # AIL Verifier — isolated immudb-py (gRPC) wrapper.
  # Keeps the SDK's protobuf dependency out of the interceptor process so
  # SPIFFE mTLS is not compromised (see ADR-0001). Both the interceptor and
  # the control plane call this service for all verified writes and reads.
  verifier:
    build:
      context: ./verifier
    ports:
      - "8003:8003"
    environment:
      - IMMUDB_ADDR=immudb:3322
      - IMMUDB_USER=${IMMUDB_USER}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD}
      # Path to ImmuDB's public signing key (derived from keys/signing.key).
      # The verifier checks every server state response against this key.
      - IMMUDB_SIGNING_PUBKEY=/keys/signing.pub
      - VERIFIER_STATE_FILE=/data/verifier-state/immudb.state
    volumes:
      - ./keys:/keys:ro
      # Verifier state is its own volume, not shared with the ledger-writing
      # identity (langgraph-demo). This enforces the write/verify separation
      # required by the trust anchor model.
      - verifier-state:/data/verifier-state
    depends_on:
      immudb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  spire-server:
    image: ghcr.io/spiffe/spire-server:1.11.1
    container_name: spire-server
    user: "0:0"
    ports:
      - "8081:8081"
    volumes:
      - ./spire/server/server.conf:/opt/spire/conf/server/server.conf
      - spire-server-data:/opt/spire/data
      - spire-server-socket:/tmp/spire-server
      - ./scripts/init-spire-data.sh:/docker-entrypoint-initdb.d/init-spire-data.sh
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck", "-socketPath", "/tmp/spire-server/private/api.sock"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    command: ["/opt/spire/bin/spire-server", "run", "-config", "/opt/spire/conf/server/server.conf"]

  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.11.1
    user: "0:0"
    depends_on:
      spire-server:
        condition: service_healthy
      token-generator:
        condition: service_completed_successfully
    volumes:
      - spire-agent-config:/opt/spire/conf/agent
      - spire-sockets:/tmp/spire-sockets
      - spire-agent-data:/opt/spire/data
      # Read-only: trust bundle written by token-generator for secure bootstrap.
      - spire-bundle:/opt/spire/bundle:ro
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck", "-socketPath", "/tmp/spire-sockets/workload_api.sock"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    # restart: "no" — the spire-agent-watchdog service manages restarts.
    # It generates a fresh join token before each restart so the one-time
    # token is never re-used, which is what caused the crash-loop.
    restart: "no"
    command: ["/opt/spire/bin/spire-agent", "run", "-config", "/opt/spire/conf/agent/agent.conf"]

  spire-agent-watchdog:
    image: docker:cli
    depends_on:
      spire-server:
        condition: service_healthy
      spire-agent:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - spire-server-socket:/tmp/spire-server
      - spire-agent-config:/opt/spire/agent-config
      - spire-bundle:/opt/spire/bundle
      - ./scripts/spire-watchdog.sh:/opt/spire/watchdog.sh:ro
    entrypoint: ["/bin/sh", "/opt/spire/watchdog.sh"]
    restart: unless-stopped

  envoy:
    image: envoyproxy/envoy:v1.27.7
    pid: "service:spire-agent"
    ports:
      - "8443:8443"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
      - spire-sockets:/tmp/spire-sockets
    depends_on:
      spire-agent:
        condition: service_started
      opa:
        condition: service_healthy
    restart: always
    command: ["/usr/local/bin/envoy", "-c", "/etc/envoy/envoy.yaml"]

  python-mtls-test:
    image: python:3.11-slim
    pid: "service:spire-agent"
    environment:
      - SPIFFE_ENDPOINT_SOCKET=unix:///tmp/spire-sockets/workload_api.sock
    volumes:
      - ./test_mtls_flow.py:/app/test_mtls_flow.py
      - spire-sockets:/tmp/spire-sockets
    working_dir: /app
    command: ["sh", "-c", "pip install httpx spiffe==0.2.5 && python test_mtls_flow.py"]
    depends_on:
      envoy:
        condition: service_started
      spire-agent:
        condition: service_started
      workload-registrar:
        condition: service_completed_successfully

  workload-registrar:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - spire-server-socket:/tmp/spire-server
      - ./scripts/register-workloads-container.sh:/opt/register.sh
    depends_on:
      spire-server:
        condition: service_healthy
      spire-agent:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "/opt/register.sh"]

  langgraph-demo:
    build:
      context: .
    pid: "service:spire-agent"
    stdin_open: true
    tty: true
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Interceptor writes go to verifier (SDK-verified writes), not direct REST.
      - VERIFIER_URL=http://verifier:8003
      - IMMUDB_USER=${IMMUDB_USER}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD}
      - SPIFFE_ENDPOINT_SOCKET=unix:///tmp/spire-sockets/workload_api.sock
      - OPA_URL=https://envoy:8443/v1/data/ail/main/allow
      - SPIRE_DISABLED=false
      - CONTROL_PLANE_URL=http://ail-control-plane:8002
      - AIL_TENANT_ID=${AIL_TENANT_ID:-tenant_default}
    volumes:
      # SPIRE workload socket — runtime mount, not baked into image.
      - spire-sockets:/tmp/spire-sockets
    working_dir: /app
    command:
      - bash
      - -c
      - |
        echo 'Waiting for SPIRE workload socket...'
        until [ -S /tmp/spire-sockets/workload_api.sock ]; do sleep 2; done
        echo 'SPIRE ready. Starting demo...'
        exec su -s /bin/bash ail-agent -c 'python /app/framework_integration/langgraph_demo.py'
    depends_on:
      spire-agent:
        condition: service_started
      opa:
        condition: service_healthy
      verifier:
        condition: service_healthy
      envoy:
        condition: service_started
      policy-validator:
        condition: service_completed_successfully

  # Epic 4: Observability & Telemetry
  prometheus:
    image: prom/prometheus:v3.10.0
    user: "0:0"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

  token-generator:
    image: docker:cli
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - spire-tokens:/opt/spire/tokens
      - spire-server-socket:/tmp/spire-server
      - spire-agent-config:/opt/spire/agent-config
      - spire-bundle:/opt/spire/bundle
    restart: "no"
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        echo "=== SPIRE Token Generator ==="
        SOCKET="/tmp/spire-server/private/api.sock"

        echo "Waiting for SPIRE server admin socket..."
        until [ -S "$$SOCKET" ]; do
          echo "  Socket not ready, waiting..."
          sleep 2
        done

        echo "Server socket ready. Generating join token..."
        TOKEN_OUTPUT=$$(docker exec spire-server \
          /opt/spire/bin/spire-server token generate \
          -spiffeID spiffe://ail.internal/agent/local \
          -socketPath "$$SOCKET" 2>&1)

        echo "Token generation result: $$TOKEN_OUTPUT"

        TOKEN=$$(echo "$$TOKEN_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')

        if [ -z "$$TOKEN" ]; then
          echo "ERROR: Failed to extract token from output"
          exit 1
        fi

        echo "Generated token: $${TOKEN:0:8}..."
        echo "$$TOKEN" > /opt/spire/tokens/join_token
        echo "Token written to shared volume"

        echo "Exporting SPIRE trust bundle for secure bootstrap..."
        docker exec spire-server \
          /opt/spire/bin/spire-server bundle show \
          -format pem \
          -socketPath "$$SOCKET" \
          > /opt/spire/bundle/trust_bundle.pem
        echo "Trust bundle written to shared volume."

        echo "Writing agent.conf with live token (insecure_bootstrap=false)..."
        {
          echo 'agent {'
          echo '    data_dir          = "/opt/spire/data"'
          echo '    log_level         = "INFO"'
          echo '    server_address    = "spire-server"'
          echo '    server_port       = "8081"'
          echo '    socket_path       = "/tmp/spire-sockets/workload_api.sock"'
          echo '    trust_domain      = "ail.internal"'
          echo '    insecure_bootstrap = false'
          echo '    trust_bundle_path  = "/opt/spire/bundle/trust_bundle.pem"'
          echo "    join_token        = \"$$TOKEN\""
          echo '}'
          echo ''
          echo 'plugins {'
          echo '    NodeAttestor "join_token" {'
          echo '        plugin_data {}'
          echo '    }'
          echo '    KeyManager "disk" {'
          echo '        plugin_data {'
          echo '            directory = "/opt/spire/data"'
          echo '        }'
          echo '    }'
          echo '    WorkloadAttestor "unix" {'
          echo '        plugin_data {}'
          echo '    }'
          echo '}'
        } > /opt/spire/agent-config/agent.conf
        echo "agent.conf written"
        echo "=== Token generation complete ==="

  # Validates all Rego policies (core + all packs) compile cleanly before
  # the agent starts. Checks the full source tree regardless of which packs
  # are enabled — catches syntax/type errors in inactive packs too.
  # Exits non-zero on any error; langgraph-demo will not start if this fails.
  policy-validator:
    image: openpolicyagent/opa:1.14.1
    volumes:
      - ./policy/core:/policy/core:ro
      - ./policy/packs:/policy/packs:ro
    command: ["check", "--strict", "/policy/core", "/policy/packs"]
    restart: "no"

  # Phase 3: CISO Control Plane Dashboard (Next.js)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
        # Browser-side fetches hit localhost:8002 (host-exposed port).
        NEXT_PUBLIC_API_URL: http://localhost:8002
        NEXT_PUBLIC_TENANT_ID: tenant_default
    ports:
      - "3001:3001"
    depends_on:
      ail-control-plane:
        condition: service_healthy
    restart: unless-stopped

volumes:
  spire-server-data:
  spire-server-socket:
  spire-sockets:
  spire-agent-data:
  spire-agent-config:
  spire-tokens:
  # Shared SPIRE server CA bundle for secure (non-insecure) agent bootstrap.
  spire-bundle:
  grafana-data:
  # Persists SQLite tenant config across docker compose down/up cycles.
  control-plane-data:
  # Verifier's rolling SDK state (PersistentRootService pickle).
  # Not mounted in the interceptor container — enforces write/verify separation.
  verifier-state:
