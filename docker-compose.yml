services:
  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--watch"
      - "--log-format=text"
      - "--log-level=info"
      - "--addr=0.0.0.0:8181"
      - "/policy"
    volumes:
      - ./policy:/policy
    # OPA image is distroless (no shell/wget). Use OPA binary to eval the
    # loaded policy — confirms binary is functional and policies compile cleanly.
    healthcheck:
      test: ["CMD", "/opa", "eval", "--data", "/policy", "data.ail.main"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  immudb:
    image: codenotary/immudb:1.9.5
    ports:
      - "3322:3322"
      # Port 8080 (REST API) intentionally not exposed to host — internal Docker
      # network only. Access via service name 'immudb' from other containers.
    environment:
      - IMMUDB_USER=${IMMUDB_USER}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD}
    healthcheck:
      test: ["CMD", "immuadmin", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  spire-server:
    image: ghcr.io/spiffe/spire-server:1.11.1
    container_name: spire-server
    user: "0:0"
    ports:
      - "8081:8081"
    volumes:
      - ./spire/server/server.conf:/opt/spire/conf/server/server.conf
      - spire-server-data:/opt/spire/data
      - spire-server-socket:/tmp/spire-server
      - ./scripts/init-spire-data.sh:/docker-entrypoint-initdb.d/init-spire-data.sh
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck", "-socketPath", "/tmp/spire-server/private/api.sock"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    command: ["/opt/spire/bin/spire-server", "run", "-config", "/opt/spire/conf/server/server.conf"]

  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.11.1
    user: "0:0"
    depends_on:
      spire-server:
        condition: service_healthy
      token-generator:
        condition: service_completed_successfully
    volumes:
      - spire-agent-config:/opt/spire/conf/agent
      - spire-sockets:/tmp/spire-sockets
      - spire-agent-data:/opt/spire/data
    restart: unless-stopped
    command: ["/opt/spire/bin/spire-agent", "run", "-config", "/opt/spire/conf/agent/agent.conf"]

  envoy:
    image: envoyproxy/envoy:v1.27-latest
    pid: "service:spire-agent"
    ports:
      - "8443:8443"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
      - spire-sockets:/tmp/spire-sockets
    depends_on:
      spire-agent:
        condition: service_started
      opa:
        condition: service_healthy
    restart: always
    command: ["/usr/local/bin/envoy", "-c", "/etc/envoy/envoy.yaml"]

  python-mtls-test:
    image: python:3.11-slim
    pid: "service:spire-agent"
    environment:
      - SPIFFE_ENDPOINT_SOCKET=unix:///tmp/spire-sockets/workload_api.sock
    volumes:
      - ./test_mtls_flow.py:/app/test_mtls_flow.py
      - spire-sockets:/tmp/spire-sockets
    working_dir: /app
    command: ["sh", "-c", "pip install httpx spiffe==0.2.5 && python test_mtls_flow.py"]
    depends_on:
      envoy:
        condition: service_started
      spire-agent:
        condition: service_started
      workload-registrar:
        condition: service_completed_successfully

  workload-registrar:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - spire-server-socket:/tmp/spire-server
      - ./scripts/register-workloads-container.sh:/opt/register.sh
    depends_on:
      spire-server:
        condition: service_healthy
      spire-agent:
        condition: service_started
    restart: "no"
    entrypoint: ["/bin/sh", "/opt/register.sh"]

  langgraph-demo:
    image: python:3.11-slim
    pid: "service:spire-agent"
    stdin_open: true
    tty: true
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - IMMUDB_URL=http://immudb:8080
      - IMMUDB_USER=${IMMUDB_USER}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD}
      - SPIFFE_ENDPOINT_SOCKET=unix:///tmp/spire-sockets/workload_api.sock
      - OPA_URL=https://envoy:8443/v1/data/ail/main/allow
      - SPIRE_DISABLED=false
    volumes:
      - .:/app
      - spire-sockets:/tmp/spire-sockets
    working_dir: /app
    command:
      - bash
      - -c
      - |
        pip install -r requirements.txt
        useradd -u 1000 -m ail-agent 2>/dev/null || true
        echo 'Waiting for SPIRE workload socket...'
        until [ -S /tmp/spire-sockets/workload_api.sock ]; do sleep 2; done
        echo 'SPIRE ready. Starting demo...'
        exec su -s /bin/bash ail-agent -c 'python /app/framework_integration/langgraph_demo.py'
    depends_on:
      spire-agent:
        condition: service_started
      opa:
        condition: service_healthy
      immudb:
        condition: service_healthy
      envoy:
        condition: service_started
      policy-validator:
        condition: service_completed_successfully

  # Epic 4: Observability & Telemetry
  prometheus:
    image: prom/prometheus:latest
    user: "0:0"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

  token-generator:
    image: docker:cli
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - spire-tokens:/opt/spire/tokens
      - spire-server-socket:/tmp/spire-server
      - spire-agent-config:/opt/spire/agent-config
    restart: "no"
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        echo "=== SPIRE Token Generator ==="
        SOCKET="/tmp/spire-server/private/api.sock"

        echo "Waiting for SPIRE server admin socket..."
        until [ -S "$$SOCKET" ]; do
          echo "  Socket not ready, waiting..."
          sleep 2
        done

        echo "Server socket ready. Generating join token..."
        TOKEN_OUTPUT=$$(docker exec spire-server \
          /opt/spire/bin/spire-server token generate \
          -spiffeID spiffe://ail.internal/agent/local \
          -socketPath "$$SOCKET" 2>&1)

        echo "Token generation result: $$TOKEN_OUTPUT"

        TOKEN=$$(echo "$$TOKEN_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')

        if [ -z "$$TOKEN" ]; then
          echo "ERROR: Failed to extract token from output"
          exit 1
        fi

        echo "Generated token: $${TOKEN:0:8}..."
        echo "$$TOKEN" > /opt/spire/tokens/join_token
        echo "Token written to shared volume"

        echo "Writing agent.conf with live token..."
        {
          echo 'agent {'
          echo '    data_dir          = "/opt/spire/data"'
          echo '    log_level         = "INFO"'
          echo '    server_address    = "spire-server"'
          echo '    server_port       = "8081"'
          echo '    socket_path       = "/tmp/spire-sockets/workload_api.sock"'
          echo '    trust_domain      = "ail.internal"'
          echo '    insecure_bootstrap = true'
          echo "    join_token        = \"$$TOKEN\""
          echo '}'
          echo ''
          echo 'plugins {'
          echo '    NodeAttestor "join_token" {'
          echo '        plugin_data {}'
          echo '    }'
          echo '    KeyManager "disk" {'
          echo '        plugin_data {'
          echo '            directory = "/opt/spire/data"'
          echo '        }'
          echo '    }'
          echo '    WorkloadAttestor "unix" {'
          echo '        plugin_data {}'
          echo '    }'
          echo '}'
        } > /opt/spire/agent-config/agent.conf
        echo "agent.conf written"
        echo "=== Token generation complete ==="

  # Validates all Rego policies compile cleanly before the agent starts.
  # If any policy has a syntax or type error, this service exits non-zero
  # and the langgraph-demo will not start — preventing silent fail-open.
  policy-validator:
    image: openpolicyagent/opa:latest
    volumes:
      - ./policy:/policy:ro
    command: ["check", "--strict", "/policy"]
    restart: "no"

volumes:
  spire-server-data:
  spire-server-socket:
  spire-sockets:
  spire-agent-data:
  spire-agent-config:
  spire-tokens:
  grafana-data:
