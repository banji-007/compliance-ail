agent {
    data_dir          = "/opt/spire/data"
    log_level         = "INFO"
    server_address    = "spire-server"
    server_port       = "8081"
    socket_path       = "/tmp/spire-sockets/workload_api.sock"
    trust_domain      = "ail.internal"
    # Secure bootstrap: agent verifies the server certificate against the
    # pinned CA bundle exported by the token-generator at startup.
    # Never set insecure_bootstrap = true in production.
    insecure_bootstrap = false
    trust_bundle_path  = "/opt/spire/bundle/trust_bundle.pem"
    join_token        = "PLACEHOLDER_TOKEN"
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            directory = "/opt/spire/data"
        }
    }

    WorkloadAttestor "unix" {
        plugin_data {}
    }
}
