server {
    bind_address = "0.0.0.0"
    bind_port    = "8081"
    trust_domain = "ail.internal"
    data_dir     = "/opt/spire/data"
    log_level    = "INFO"
    ca_ttl                = "720h"
    default_x509_svid_ttl = "24h"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type     = "sqlite3"
            connection_string = "/opt/spire/data/server.db"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/keys.json"
        }
    }
}
