# docker-compose.test.yml — Minimal CI infrastructure for integration tests.
#
# Spins up only the three services pytest needs:
#   ail-control-plane  — serves OPA policy bundles; seeds default tenant
#   opa                — policy engine; polls bundle from control plane
#   immudb             — tamper-evident audit ledger
#
# SPIRE, Envoy, Grafana, Prometheus, and the dashboard are NOT included.
# Tests run with SPIRE_DISABLED=true so mTLS is bypassed.
#
# Usage:  make test-integration
# Requires: Docker Compose v2 (docker compose, not docker-compose)

services:

  ail-control-plane:
    build:
      context: ./control_plane
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=sqlite:////data/control_plane.db
      - IMMUDB_URL=http://immudb:8080
      - IMMUDB_USER=${IMMUDB_USER:-immudb}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD:-immudb}
      - VERIFIER_URL=http://verifier:8003
      - CONTROL_PLANE_API_KEY=${CONTROL_PLANE_API_KEY:-test-api-key}
    volumes:
      - ./policy:/policy:ro
      - test-control-plane-data:/data
    working_dir: /app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 25s

  opa:
    image: openpolicyagent/opa:1.14.1
    ports:
      - "8181:8181"
    environment:
      - AIL_TENANT_ID=tenant_default
    command:
      - "run"
      - "--server"
      - "--config-file=/config/opa-config.yaml"
      - "--log-format=text"
      - "--log-level=info"
      - "--addr=0.0.0.0:8181"
    volumes:
      - ./opa-config.yaml:/config/opa-config.yaml:ro
    depends_on:
      ail-control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opa", "version"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s

  immudb:
    image: codenotary/immudb:1.9.5
    ports:
      # Expose both ports to host: REST (8080) for scan calls from tests running
      # on the host, and gRPC (3322) for the in-process immudb-py tamper tests.
      - "8080:8080"
      - "3322:3322"
    environment:
      - IMMUDB_USER=${IMMUDB_USER:-immudb}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD:-immudb}
    volumes:
      - ./keys:/keys:ro
    command:
      - "--signingKey=/keys/signing.key"
    healthcheck:
      test: ["CMD", "immuadmin", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  verifier:
    build:
      context: ./verifier
    ports:
      - "8003:8003"
    environment:
      - IMMUDB_ADDR=immudb:3322
      - IMMUDB_USER=${IMMUDB_USER:-immudb}
      - IMMUDB_PASSWORD=${IMMUDB_PASSWORD:-immudb}
      - IMMUDB_SIGNING_PUBKEY=/keys/signing.pub
      - VERIFIER_STATE_FILE=/data/verifier-state/immudb.state
    volumes:
      - ./keys:/keys:ro
      - test-verifier-state:/data/verifier-state
    depends_on:
      immudb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 20s

volumes:
  test-control-plane-data:
  test-verifier-state:
